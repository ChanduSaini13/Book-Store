version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: books_db
    environment:
      POSTGRES_DB: books_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - books_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: books_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/books_db
      JWT_SECRET: your_super_secret_jwt_key_change_in_production
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - books_network
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: books_frontend
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - books_network

volumes:
  postgres_data:

networks:
  books_network:
    driver: bridge
